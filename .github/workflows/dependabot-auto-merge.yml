name: Dependabot Auto Merge

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

jobs:
  automerge:
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Fetch Dependabot metadata
      # No environment variables are required for this action.
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Approve safe non-breaking updates
        if: |
          github.event.pull_request.draft == false &&
          (steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
           steps.metadata.outputs.update-type == 'version-update:semver-minor')
        env:
          # Uses the workflow-scoped token to approve Dependabot PRs.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr review "${{ github.event.pull_request.number }}" --approve

      - name: Enable auto-merge for safe non-breaking updates
        if: |
          github.event.pull_request.draft == false &&
          (steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
           steps.metadata.outputs.update-type == 'version-update:semver-minor')
        env:
          # Uses the workflow-scoped token to enable GitHub auto-merge.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge "${{ github.event.pull_request.number }}" --auto --merge
