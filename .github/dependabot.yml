version: 2
updates:
  # Keep GitHub Actions used by workflows up to date.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "automation"

  # Keep Node.js dependencies updated for the repository root.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:30"
      timezone: "UTC"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "javascript"
    # Group patch and minor updates to reduce PR noise.
    groups:
      npm-nonbreaking:
        update-types:
          - "minor"
          - "patch"
